<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 2;
    }
    
    .glitch {
      font-size: 8rem;
      font-weight: 800;
      color: var(--text-color);
      position: relative;
      margin: 0;
      text-shadow: 0.05em 0 0 rgba(255,0,0,0.75),
                  -0.025em -0.05em 0 rgba(46, 204, 113, 0.75),
                  0.025em 0.05em 0 rgba(66, 133, 244, 0.75);
      animation: glitch 500ms infinite;
    }

    .glitch span {
      position: absolute;
      top: 0;
      left: 0;
    }

    .glitch span:first-child {
      animation: glitch 650ms infinite;
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      transform: translate(-0.025em, -0.0125em);
      opacity: 0.8;
    }

    .glitch span:last-child {
      animation: glitch 375ms infinite;
      clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%);
      transform: translate(0.0125em, 0.025em);
      opacity: 0.8;
    }

    @keyframes glitch {
      0% { text-shadow: 0.05em 0 0 rgba(155, 114, 203, 0.75), -0.05em -0.025em 0 rgba(46, 204, 113, 0.75), -0.025em 0.05em 0 rgba(66, 133, 244, 0.75); }
      14% { text-shadow: 0.05em 0 0 rgba(155, 114, 203, 0.75), -0.05em -0.025em 0 rgba(46, 204, 113, 0.75), -0.025em 0.05em 0 rgba(66, 133, 244, 0.75); }
      15% { text-shadow: -0.05em -0.025em 0 rgba(155, 114, 203, 0.75), 0.025em 0.025em 0 rgba(46, 204, 113, 0.75), -0.05em -0.05em 0 rgba(66, 133, 244, 0.75); }
      49% { text-shadow: -0.05em -0.025em 0 rgba(155, 114, 203, 0.75), 0.025em 0.025em 0 rgba(46, 204, 113, 0.75), -0.05em -0.05em 0 rgba(66, 133, 244, 0.75); }
      50% { text-shadow: 0.025em 0.05em 0 rgba(155, 114, 203, 0.75), 0.05em 0 0 rgba(46, 204, 113, 0.75), 0 -0.05em 0 rgba(66, 133, 244, 0.75); }
      99% { text-shadow: 0.025em 0.05em 0 rgba(155, 114, 203, 0.75), 0.05em 0 0 rgba(46, 204, 113, 0.75), 0 -0.05em 0 rgba(66, 133, 244, 0.75); }
      100% { text-shadow: -0.025em 0 0 rgba(155, 114, 203, 0.75), -0.025em -0.025em 0 rgba(46, 204, 113, 0.75), -0.025em -0.05em 0 rgba(66, 133, 244, 0.75); }
    }

    .terminal-window {
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      width: 100%;
      max-width: 600px;
      margin: 2rem 0;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      text-align: left;
    }

    .terminal-header {
      background: rgba(255, 255, 255, 0.05);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .terminal-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .dot-red { background: #ff5f56; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green { background: #27c93f; }

    .terminal-body {
      padding: 1.5rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.95rem;
      color: var(--gemini-green, #27c93f);
      height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--gemini-purple) transparent;
    }

    .log-line {
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.3s ease forwards;
    }

    .log-error { color: #ff5f56; }
    .log-warn { color: #ffbd2e; }
    .log-sys { color: var(--gemini-blue, #4285F4); }
    .log-highlight { color: var(--gemini-purple, #9b72cb); font-weight: bold; }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: var(--gemini-green, #27c93f);
      animation: blink 1s step-end infinite;
      vertical-align: middle;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .interactive-btn {
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .interactive-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(155, 114, 203, 0.4);
    }
    .interactive-btn::before {
      content: '';
      position: absolute;
      top: var(--y, 50%);
      left: var(--x, 50%);
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 40%);
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .interactive-btn:hover::before {
      opacity: 1;
    }

    /* Floating elements */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: float 10s ease-in-out infinite;
    }
    .shape1 {
      width: 300px; height: 300px;
      background: rgba(66, 133, 244, 0.15); /* gemini-blue */
      top: 10%; left: 10%;
    }
    .shape2 {
      width: 400px; height: 400px;
      background: rgba(155, 114, 203, 0.15); /* gemini-purple */
      bottom: 10%; right: 10%;
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>
  
  <header style="justify-content: center; position: relative; z-index: 10;">
    <a href="/" class="logo-container">
      <h1 class="title">NightCap Feedback</h1>
    </a>
  </header>

  <main>
    <div class="error-container">
      <h1 class="glitch" data-text="404">
        404
        <span>404</span>
        <span>404</span>
      </h1>
      <h2 style="margin: 1rem 0; font-weight: 500; font-size: 1.5rem; text-shadow: 0 0 10px rgba(255,255,255,0.1);">Page Not Found in the Matrix</h2>
      
      <div class="terminal-window">
        <div class="terminal-header">
          <div class="terminal-dot dot-red"></div>
          <div class="terminal-dot dot-yellow"></div>
          <div class="terminal-dot dot-green"></div>
          <span style="margin-left: auto; color: #888; font-size: 0.8rem; font-family: monospace;">bash - sys_diagnostic</span>
        </div>
        <div class="terminal-body" id="terminalLogs">
          <!-- Logs injected by JS -->
          <span class="cursor" id="cursor"></span>
        </div>
      </div>

      <p style="opacity: 0.8; max-width: 500px; line-height: 1.6; margin-bottom: 2rem;">
        The route you requested could not be resolved by our servers. The coordinates may be corrupted or the page has been redacted from the public timeline.
      </p>

      <a href="/" class="primary-btn interactive-btn" id="returnBtn">
        Initialize Return Sequence
      </a>
    </div>
  </main>

  <script>
    // Terminal Log Animation Array
    const logs = [
      { text: "> Initiating deep space route scan...", type: "log-sys", delay: 300 },
      { text: "> Querying internal routing tables...", type: "", delay: 800 },
      { text: "> WARNING: Temporal anomaly detected.", type: "log-warn", delay: 1500 },
      { text: `> Resolving path: <span class="log-highlight">${window.location.pathname}</span>`, type: "", delay: 2000 },
      { text: "> ERROR: HTTP 404 - Target resource not located.", type: "log-error", delay: 2600 },
      { text: "> Checking secondary cache modules...", type: "log-sys", delay: 3200 },
      { text: "> Module response: NULL", type: "log-error", delay: 3800 },
      { text: "> Attempting automated recovery...", type: "log-sys", delay: 4200 },
      { text: "> Recovery failed. User manual override required.", type: "log-warn", delay: 4900 },
      { text: "> Awaiting input...", type: "", delay: 5400 }
    ];

    const terminalBody = document.getElementById('terminalLogs');
    const cursor = document.getElementById('cursor');

    // Inject logs sequentially
    logs.forEach(log => {
      setTimeout(() => {
        const line = document.createElement('div');
        line.className = `log-line ${log.type}`;
        line.innerHTML = log.text; // Using innerHTML to render span highlights
        terminalBody.insertBefore(line, cursor);
        terminalBody.scrollTop = terminalBody.scrollHeight;
      }, log.delay);
    });

    // Interactive Button Effect
    const btn = document.getElementById('returnBtn');
    btn.addEventListener('mousemove', (e) => {
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      btn.style.setProperty('--x', `${x}px`);
      btn.style.setProperty('--y', `${y}px`);
    });

    // Theme logic to match UI
    // Ensure dark theme is set for best visual impact of terminal
    document.documentElement.setAttribute('data-theme', 'dark');
  </script>
</body>
</html>
